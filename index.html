<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buttons Your Way</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <span class="site-title">Buttons Your Way</span>

    <p class="hint" id="hint">Decorate your images with Buttons Your Way!<br><br>- Type to Generate<br>- Drag Buttons to
      Place<br>- Hover + Scroll to Rotate</p>

    <div class="control-group">
      <label>Hole⋆ ☆。*。☆</label>
      <div class="toggle-group" id="holeTabs">
        <button class="toggle on" data-cfg="nine">9</button>
        <button class="toggle" data-cfg="six">6</button>
        <button class="toggle" data-cfg="four">4</button>
      </div>
    </div>

    <div class="control-group">
      <label>Thread Color｡ﾟﾟ･｡･ﾟﾟ . ⁺</label>
      <div class="toggle-group">
        <button class="toggle" id="colorDisplay" onclick="document.getElementById('colorWheel').click()">
          <div id="colorSwatch" style="background:#111;"></div>
        </button>
      </div>
      <input type="color" id="colorWheel" value="#111111" style="display:none">
    </div>

    <div class="control-group">
      <label>Button Size₊⊹☾⋆.ೃ࿔*:⋆</label>
      <input type="range" id="sizeSlider" min="50" max="100" value="100">
    </div>

    <div class="control-group">
      <label>Background</label>
      <div class="toggle-group" id="bgTabs">
        <button class="toggle thumb-btn" data-bg="assets/bg/1.jpg"
          style="background-image:url('assets/bg/1.jpg')"></button>
        <button class="toggle thumb-btn" data-bg="assets/bg/2.jpg"
          style="background-image:url('assets/bg/2.jpg')"></button>
        <button class="toggle thumb-btn" data-bg="assets/bg/3.jpg"
          style="background-image:url('assets/bg/3.jpg')"></button>
        <label class="toggle" for="bgUpload" style="cursor:pointer;">+</label>
        <input type="file" id="bgUpload" accept="image/*" style="display:none">
        <button class="toggle" data-bg="none">X</button>
      </div>
    </div>

    <button class="toggle" id="downloadBtn">Download</button>


  </header>

  <main id="displayArea">
    <div id="buttonsRow"></div>
    <img id="buttonAscii" src="assets/buttonascii.png">
  </main>

  <input id="textInput" style="position:fixed;opacity:0;pointer-events:none;">

  <script src="buttonThreads.js"></script>
  <script src="js/button.js"></script>
  <script src="js/draw.js"></script>
  <script src="js/input.js"></script>
  <script src="js/download.js"></script>
</body>

</html>
